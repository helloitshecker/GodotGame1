<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#F7F9FC"></stop>
            <stop offset="100%" stop-color="#CBD7E5"></stop>
        </linearGradient>

        <linearGradient id="pillar" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#59626E"></stop>
            <stop offset="100%" stop-color="#232A33"></stop>
        </linearGradient>
    </defs>

    <!-- Rounded background -->
    <rect width="512" height="512" rx="96" fill="url(#bg)"></rect>

    <!-- Glow -->
    <circle cx="256" cy="170" r="120" fill="white" opacity="0.75"></circle>

    <!-- Monolith -->
    <rect x="216" y="60" width="80" height="330" rx="8" fill="url(#pillar)"></rect>

    <!-- Light grooves -->
    <rect x="234" y="60" width="3" height="330" fill="#86C7FF" opacity=".25"></rect>
    <rect x="256" y="60" width="3" height="330" fill="#86C7FF" opacity=".25"></rect>
    <rect x="278" y="60" width="3" height="330" fill="#86C7FF" opacity=".25"></rect>

    <!-- Eclipse ring -->
    <circle cx="256" cy="400" r="88" fill="none" stroke="#B8E4FF" stroke-width="10" opacity=".9"></circle>

    <!-- Small figure -->
    <circle cx="256" cy="338" r="18" fill="#2A2A35"></circle>
    <rect x="244" y="355" width="24" height="48" rx="8" fill="#C8A38A"></rect>
</svg>